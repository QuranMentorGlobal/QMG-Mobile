name: Build & Submit (Android · Play Internal)

# Manual trigger: open the Actions tab → "Build & Submit" → Run workflow.
# Builds a production .aab LOCALLY on the GitHub runner (eas build --local) and
# submits it to the Google Play **internal** track.
#
# Why --local: local CI builds are ALWAYS free and DO NOT count against your
# EAS Build monthly quota (the 15 Android builds). Signing still reuses your
# EAS-managed upload keystore automatically via EXPO_TOKEN, so Play keeps
# accepting your uploads with no keystore handling here.
#
# Fingerprint gate: before building, this hashes only the NATIVE layer (native
# deps, app.json native config, plugins, permissions, icon/splash). If nothing
# native changed since the last build, it skips and tells you to ship via OTA
# instead — so you never waste time or a Play versionCode on a JS-only change.
# Override the gate with the "force" input when you really want to rebuild.

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Also submit to Google Play internal track?'
        type: boolean
        default: true
      force:
        description: 'Force a build even if no native changes are detected'
        type: boolean
        default: false

permissions:
  contents: write   # needed to push the fingerprint tag after a build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Compute native fingerprint
        id: fp
        run: |
          npm i -D @expo/fingerprint >/dev/null 2>&1 || true
          HASH=$(node -e "require('@expo/fingerprint').createFingerprintAsync('.', { platforms: ['android'] }).then(f => console.log(f.hash)).catch(e => { console.error(e); process.exit(1); })")
          if [ -z "$HASH" ]; then echo "Failed to compute fingerprint"; exit 1; fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Native fingerprint: $HASH"

      - name: Decide build vs OTA (fingerprint gate)
        id: gate
        run: |
          HASH="${{ steps.fp.outputs.hash }}"
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "::notice::Force build requested — skipping the fingerprint gate."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse -q --verify "refs/tags/native-fp-$HASH" >/dev/null; then
            echo "::notice::No native changes since the last build (fingerprint already built)."
            echo "------------------------------------------------------------------"
            echo "👉 Nothing to build. This change is JS/asset-only."
            echo "   Use the 'OTA Update' workflow — it ships instantly, delivers"
            echo "   your JS AND bundled assets, and uses zero build quota."
            echo "------------------------------------------------------------------"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Native fingerprint changed — a new build is needed."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Play service account key
        if: steps.gate.outputs.should_build == 'true' && inputs.submit
        run: echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > play-service-account.json

      # --local => builds on THIS runner (free, no EAS quota). Credentials +
      # versionCode (appVersionSource: remote, autoIncrement) are still pulled
      # from EAS, so signing and versioning behave exactly like a cloud build.
      - name: Build Android AAB locally (no EAS quota)
        if: steps.gate.outputs.should_build == 'true'
        run: eas build --platform android --profile production --local --non-interactive --output ./app-release.aab

      - name: Submit the built AAB to Play (internal track)
        if: steps.gate.outputs.should_build == 'true' && inputs.submit
        run: eas submit --platform android --profile production --path ./app-release.aab --non-interactive

      - name: Record built fingerprint (tag)
        if: steps.gate.outputs.should_build == 'true'
        run: |
          HASH="${{ steps.fp.outputs.hash }}"
          git tag "native-fp-$HASH" || true
          git push origin "native-fp-$HASH" || true
