name: OTA Update (instant)

# Every push to main publishes an over-the-air update to the production channel.
# Testers who already installed the app get JS/asset changes in seconds — no rebuild,
# no re-upload to Play. (Native/dependency/permission changes still need a full build.)

on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Publish OTA update
        run: eas update --channel production --message "${{ github.event.head_commit.message }}" --non-interactive
